<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Grabador de Casos de Uso</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" id="statusDot"></span>
        <h1>Grabador de Casos</h1>
      </div>
      <span class="brand-sub" id="statusText">Inactivo</span>
    </header>

    <!-- ---------- Pantalla: configurar e iniciar grabación ---------- -->
    <section id="setupView" class="view">
      <label class="field">
        <span class="field-label">Título del caso de uso</span>
        <input id="titleInput" type="text" placeholder='Ej: "Prueba de login"' maxlength="120" />
      </label>

      <div class="field">
        <span class="field-label">¿Qué quieres grabar?</span>
        <div class="scope-options">
          <label class="scope-card">
            <input type="radio" name="scope" value="tab" checked />
            <div>
              <strong>Esta pestaña</strong>
              <small>Solo la pestaña activa</small>
            </div>
          </label>
          <label class="scope-card">
            <input type="radio" name="scope" value="window" />
            <div>
              <strong>Toda la ventana</strong>
              <small>Incluye pestañas nuevas que se abran</small>
            </div>
          </label>
        </div>
      </div>

      <button id="startBtn" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="currentColor"/></svg>
        Iniciar grabación
      </button>

      <p class="hint">La extensión necesita permiso para leer la pestaña activa, detectar navegación y ejecutar un script en la página. Estos permisos se solicitan al instalarla.</p>
    </section>

    <!-- ---------- Pantalla: grabando ---------- -->
    <section id="recordingView" class="view hidden">
      <div class="recording-banner">
        <span class="pulse"></span>
        <div>
          <strong id="recordingTitle">Título</strong>
          <small id="recordingScope">Esta pestaña</small>
        </div>
      </div>

      <ol id="liveSteps" class="steps-list"></ol>

      <button id="stopBtn" class="btn btn-danger">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect width="12" height="12" rx="2" fill="currentColor"/></svg>
        Detener y guardar
      </button>
    </section>

    <!-- ---------- Casos guardados ---------- -->
    <section class="view">
      <div class="section-title-row">
        <span class="field-label">Casos guardados</span>
        <button id="exportAllBtn" class="btn-link">Exportar todo</button>
      </div>
      <div id="casesList" class="cases-list">
        <p class="empty-msg" id="emptyMsg">Todavía no hay casos guardados.</p>
      </div>
    </section>

  </div>

  <!-- Plantilla de tarjeta de caso guardado -->
  <template id="caseCardTemplate">
    <div class="case-card">
      <div class="case-card-main">
        <strong class="case-title"></strong>
        <small class="case-meta"></small>
      </div>
      <div class="case-card-actions">
        <button class="btn-icon view-btn" title="Ver pasos">Ver</button>
        <button class="btn-icon export-btn" title="Exportar JSON">JSON</button>
        <button class="btn-icon delete-btn" title="Eliminar">Eliminar</button>
      </div>
      <ol class="case-steps hidden"></ol>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
